worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # Internal docker DNS - lets the upstream names resolve at request time so
    # nginx doesn't fail to start when a service is briefly down.
    resolver 127.0.0.11 ipv6=off valid=10s;

    upstream api_service  { server api-service:8000;  }
    upstream auth_service { server auth-service:8000; }

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Public API - the only surface the SPA hits for data.
        location /api/ {
            proxy_pass         http://api_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Auth - login / user mgmt. Kept under its own prefix so we can slot
        # in Authentik/Keycloak later by re-pointing this block.
        location /auth/ {
            proxy_pass         http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /assets/ {
            access_log off;
            expires 7d;
            try_files $uri =404;
        }

        location / {
            add_header Cache-Control "no-cache, must-revalidate" always;
            try_files $uri $uri/ /index.html;
        }
    }
}
