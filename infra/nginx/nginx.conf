worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    map $http_upgrade $connection_upgrade_authentik {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://api-service:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # LiteLLM OpenAI-compatible API (same-origin for SPA model lists). Path: /litellm/v1/models etc.
        location /litellm/ {
            proxy_pass http://litellm:4000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Authentik (OIDC admin UI + flows). Matches AUTHENTIK_WEB__PATH=/authentik/
        location /authentik/ {
            proxy_pass http://authentik-server:9000;
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade_authentik;
            proxy_buffers 8 16k;
            proxy_buffer_size 32k;
        }

        location /assets/ {
            access_log off;
            expires 7d;
            try_files $uri =404;
        }

        location / {
            add_header Cache-Control "no-cache, must-revalidate" always;
            try_files $uri $uri/ /index.html;
        }
    }
}
