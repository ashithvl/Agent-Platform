# Full enterprise dev stack. Single-replica everywhere; K8s/Helm happen later.
# `docker compose up --build` should be enough on a fresh checkout.
#
# Secrets you actually need to set yourself (copy the .env.example files first):
#   infra/litellm/.env    -> OPENAI_API_KEY, ANTHROPIC_API_KEY, ...
#   infra/langfuse/.env   -> LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY
#                           (generate via the Langfuse UI on first boot, then paste back)

x-python-service: &python-service
  build:
    context: .
    dockerfile: services/Dockerfile.python
  restart: unless-stopped
  environment:
    POSTGRES_DSN: postgresql+psycopg://eai:eai@postgres:5432/eai
    # Alembic / async SQLAlchemy often read DATABASE_URL; without this they fall back to localhost:5432.
    DATABASE_URL: postgresql+asyncpg://eai:eai@postgres:5432/eai
    REDIS_URL: redis://redis:6379/0
    JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me}
    JWT_ISSUER: eai-auth-service
    JWT_AUDIENCE: eai-api
    JWT_TTL_MINUTES: "60"
    LITELLM_BASE_URL: http://litellm:4000
    LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-dev-master}
    LANGFUSE_HOST: http://langfuse-web:3000
    LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
    LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio12345}

services:
  # ---------------------------------------------------------------------------
  # Edge + web
  # ---------------------------------------------------------------------------
  web:
    container_name: eai-web
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    depends_on:
      - api-service
      - auth-service
    ports:
      - "8080:80"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Data plane
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: eai-postgres
    environment:
      POSTGRES_USER: eai
      POSTGRES_PASSWORD: eai
      POSTGRES_DB: eai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eai"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres-langfuse:
    image: postgres:16-alpine
    container_name: eai-postgres-langfuse
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - pgdata-langfuse:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: eai-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: eai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio12345}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: eai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      for b in uploads extracts exports langfuse; do
        mc mb -p local/$$b || true;
      done
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio12345}
    restart: "no"

  # ---------------------------------------------------------------------------
  # Model gateway + observability
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: eai-litellm
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: ./infra/litellm/.env
        required: false
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-dev-master}
      LITELLM_DATABASE_URL: postgresql://eai:eai@postgres:5432/eai
      # config.yaml references these; empty env can prevent the proxy from starting.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder-set-real-key-in-infra-litellm-env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-placeholder-set-real-key-in-infra-litellm-env}
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    # Official image often has no `curl`; use Python (always present).
    # After `prisma migrate deploy`, main-stable runs a post-migration diff and
    # `prisma db execute` — that can take 1–3+ minutes before :4000 answers.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:4000/health/liveliness\", timeout=5)"',
        ]
      interval: 10s
      timeout: 8s
      retries: 40
      start_period: 240s
    restart: unless-stopped

  langfuse-web:
    image: langfuse/langfuse:2
    container_name: eai-langfuse-web
    depends_on:
      postgres-langfuse:
        condition: service_healthy
    env_file:
      - path: ./infra/langfuse/.env
        required: false
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@postgres-langfuse:5432/langfuse
      NEXTAUTH_URL: http://localhost:3003
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-replace-me-nextauth-secret}
      SALT: ${LANGFUSE_SALT:-replace-me-salt}
      LANGFUSE_CSP_ENFORCE_HTTPS: "false"
      TELEMETRY_ENABLED: "false"
    ports:
      - "3003:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/public/health"]
      interval: 10s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Our services
  # ---------------------------------------------------------------------------
  auth-service:
    <<: *python-service
    container_name: eai-auth-service
    build:
      context: .
      dockerfile: services/Dockerfile.python
      args:
        SERVICE_DIR: services/auth-service
        APP_MODULE: app.main:app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 10

  api-service:
    <<: *python-service
    container_name: eai-api-service
    build:
      context: .
      dockerfile: services/Dockerfile.python
      args:
        SERVICE_DIR: services/api-service
        APP_MODULE: app.main:app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 10

  agent-service:
    <<: *python-service
    container_name: eai-agent-service
    build:
      context: .
      dockerfile: services/Dockerfile.python
      args:
        SERVICE_DIR: services/agent-service
        APP_MODULE: app.main:app
    depends_on:
      postgres:
        condition: service_healthy

  execution-service:
    <<: *python-service
    container_name: eai-execution-service
    build:
      context: .
      dockerfile: services/Dockerfile.python
      args:
        SERVICE_DIR: services/execution-service
        APP_MODULE: app.main:app
    depends_on:
      litellm:
        condition: service_healthy

  knowledge-service:
    <<: *python-service
    container_name: eai-knowledge-service
    build:
      context: .
      dockerfile: services/Dockerfile.python
      args:
        SERVICE_DIR: services/knowledge-service
        APP_MODULE: app.main:app

  ingestion-worker:
    <<: *python-service
    # Dedicated tag so this never reuses the API/auth image by mistake.
    image: ${COMPOSE_PROJECT_NAME:-document-rag}-ingestion-worker:local
    container_name: eai-ingestion-worker
    build:
      context: .
      dockerfile: services/Dockerfile.python
      args:
        SERVICE_DIR: services/ingestion-worker
        APP_MODULE: app.main:broker
    command:
      ["/usr/local/bin/python", "-m", "taskiq", "worker", "app.main:broker"]
    depends_on:
      redis:
        condition: service_healthy

  worker-service:
    <<: *python-service
    # Same image as worker-scheduler (same SERVICE_DIR); distinct from other Python services.
    image: ${COMPOSE_PROJECT_NAME:-document-rag}-taskiq-worker:local
    container_name: eai-worker-service
    build:
      context: .
      dockerfile: services/Dockerfile.python
      args:
        SERVICE_DIR: services/worker-service
        APP_MODULE: app.main:broker
    command:
      ["/usr/local/bin/python", "-m", "taskiq", "worker", "app.main:broker"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker-scheduler:
    <<: *python-service
    image: ${COMPOSE_PROJECT_NAME:-document-rag}-taskiq-worker:local
    container_name: eai-worker-scheduler
    build:
      context: .
      dockerfile: services/Dockerfile.python
      args:
        SERVICE_DIR: services/worker-service
        APP_MODULE: app.main:broker
    command:
      ["/usr/local/bin/python", "-m", "taskiq", "scheduler", "app.main:scheduler"]
    depends_on:
      redis:
        condition: service_healthy
      worker-service:
        condition: service_started

volumes:
  pgdata:
  pgdata-langfuse:
  redisdata:
  miniodata:
