services:
  nginx:
    container_name: e-ai-platform-nginx
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      api-service:
        condition: service_started
      authentik-server:
        condition: service_started
      litellm:
        condition: service_started
    networks:
      - platform

  postgres-app:
    container_name: e-ai-platform-postgres-app
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    volumes:
      - pg-app-data:/var/lib/postgresql/data
    networks:
      - platform

  postgres-authentik:
    container_name: e-ai-platform-postgres-authentik
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentik
      POSTGRES_DB: authentik
    volumes:
      - pg-authentik-data:/var/lib/postgresql/data
    networks:
      - platform

  redis-authentik:
    container_name: e-ai-platform-redis-authentik
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-authentik-data:/data
    networks:
      - platform

  authentik-server:
    container_name: e-ai-platform-authentik-server
    image: ghcr.io/goauthentik/server:latest
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: redis-authentik
      AUTHENTIK_POSTGRESQL__HOST: postgres-authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-change-me}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-admin@example.com}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-admin}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:-bootstrap-token}
      # Public URL (via nginx on :8080). Trailing slash recommended for recent Authentik.
      AUTHENTIK_HOST: ${AUTHENTIK_HOST:-http://localhost:8080/authentik/}
      AUTHENTIK_HOST_BROWSER: ${AUTHENTIK_HOST_BROWSER:-http://localhost:8080/authentik/}
      AUTHENTIK_WEB__PATH: /authentik/
      AUTHENTIK_LISTEN__TRUSTED_PROXY_CIDRS: 172.16.0.0/12 10.0.0.0/8
    depends_on:
      postgres-authentik:
        condition: service_started
      redis-authentik:
        condition: service_started
    networks:
      - platform

  authentik-worker:
    container_name: e-ai-platform-authentik-worker
    image: ghcr.io/goauthentik/server:latest
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: redis-authentik
      AUTHENTIK_POSTGRESQL__HOST: postgres-authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-change-me}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      # Required on the worker for automated install (bootstrap runs here); see Authentik docs.
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-admin@example.com}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-admin}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:-bootstrap-token}
      AUTHENTIK_HOST: ${AUTHENTIK_HOST:-http://localhost:8080/authentik/}
      AUTHENTIK_HOST_BROWSER: ${AUTHENTIK_HOST_BROWSER:-http://localhost:8080/authentik/}
      AUTHENTIK_WEB__PATH: /authentik/
    depends_on:
      postgres-authentik:
        condition: service_started
      redis-authentik:
        condition: service_started
    networks:
      - platform

  redis:
    container_name: e-ai-platform-redis
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - platform

  minio:
    container_name: e-ai-platform-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    networks:
      - platform

  litellm:
    container_name: e-ai-platform-litellm
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: sk-litellm-master-key
      STORE_MODEL_IN_DB: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    networks:
      - platform

  agent-service:
    container_name: e-ai-platform-agent-service
    build:
      context: ./services/agent-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://platform:platform@postgres-app:5432/platform
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
    depends_on:
      postgres-app:
        condition: service_started
    networks:
      - platform

  execution-service:
    container_name: e-ai-platform-execution-service
    build:
      context: ./services/execution-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://platform:platform@postgres-app:5432/platform
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      LITELLM_URL: http://litellm:4000
      LITELLM_API_KEY: sk-litellm-master-key
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
    depends_on:
      postgres-app:
        condition: service_started
      litellm:
        condition: service_started
      agent-service:
        condition: service_started
    networks:
      - platform

  knowledge-service:
    container_name: e-ai-platform-knowledge-service
    build:
      context: ./services/knowledge-service
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents
    depends_on:
      postgres-app:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - platform

  worker-service:
    container_name: e-ai-platform-worker-service
    build:
      context: ./services/worker-service
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents
      LANCEDB_PATH: /data/lancedb
    volumes:
      - lancedb-data:/data/lancedb
    depends_on:
      postgres-app:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      agent-service:
        condition: service_started
    networks:
      - platform

  api-service:
    container_name: e-ai-platform-api-service
    build:
      context: ./services/api-service
      dockerfile: Dockerfile
    environment:
      OIDC_ISSUER_URL: http://authentik-server:9000/authentik/application/o/web-spa/
      OIDC_CLIENT_ID: web-spa
      # BFF password login: API calls Authentik internally; redirect_uri is only for OAuth code (not shown to users).
      AUTHENTIK_INTERNAL_BASE: http://authentik-server:9000/authentik
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:8080/callback}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      AGENT_SERVICE_URL: http://agent-service:8001
      EXECUTION_SERVICE_URL: http://execution-service:8002
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8003
      REDIS_URL: redis://redis:6379/1
    depends_on:
      authentik-server:
        condition: service_started
      agent-service:
        condition: service_started
      execution-service:
        condition: service_started
      knowledge-service:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - platform

networks:
  platform:
    driver: bridge

volumes:
  pg-app-data:
  pg-authentik-data:
  redis-data:
  redis-authentik-data:
  minio-data:
  lancedb-data:
